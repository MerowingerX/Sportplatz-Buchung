<tr id="mannschaft-{{ m.notion_id }}" class="user-row--editing">
  <td>
    <input type="text" name="name" value="{{ m.name }}" class="input--small" style="width:140px;" required>
  </td>
  <td>
    <input type="text" name="shortname" value="{{ m.shortname or '' }}" class="input--small" style="width:80px;" placeholder="z.B. A1">
  </td>
  <td>
    <select name="trainer_id" class="input--small" style="width:130px;margin-bottom:4px;" title="Primärer Verantwortlicher">
      <option value="">– kein primärer –</option>
      {% for t in trainers %}
        <option value="{{ t.notion_id }}" {{ 'selected' if m.trainer_id == t.notion_id }}>{{ t.name }}</option>
      {% endfor %}
    </select>
    <div style="display:flex;flex-direction:column;gap:2px;max-height:110px;overflow:auto;min-width:130px;border-top:1px dashed var(--color-border);padding-top:3px;">
      <span class="text-muted text-sm">weitere Zugewiesene:</span>
      {% for t in trainers %}
      <label style="white-space:nowrap;font-size:.8rem;">
        <input type="checkbox" name="user_id" value="{{ t.notion_id }}"
               {{ 'checked' if t.notion_id in verantwortlich_ids }}>
        {{ t.name }}
      </label>
      {% endfor %}
    </div>
  </td>
  <td>
    <input type="text" name="fussball_de_team_id" value="{{ m.fussball_de_team_id or '' }}" class="input--small" style="width:140px;" placeholder="Team-ID">
  </td>
  <td>
    <input type="text" name="cc_emails" value="{{ m.cc_emails | join(', ') }}" class="input--small" style="width:180px;" placeholder="kommagetrennt">
    {% if verantwortlich_emails[m.notion_id] %}
    <div class="text-muted text-sm" style="margin-top:3px;" title="bekommen automatisch CC (Verantwortliche)">
      + auto: {{ verantwortlich_emails[m.notion_id] | join(', ') }}
    </div>
    {% endif %}
  </td>
  <td>
    <input type="color" name="color" value="{{ m.color or '#888888' }}" style="width:40px;height:28px;padding:1px;border:1px solid #ccc;border-radius:3px;cursor:pointer;">
  </td>
  <td>
    <input type="checkbox" name="aktiv" value="1" {{ 'checked' if m.aktiv }}>
  </td>
  <td class="text-right nowrap">
    <button class="btn btn--primary btn--small"
            hx-patch="/admin/mannschaften/{{ m.notion_id }}"
            hx-include="closest tr"
            hx-target="#mannschaft-{{ m.notion_id }}"
            hx-swap="outerHTML">
      Speichern
    </button>
    <button class="btn btn--ghost btn--small"
            hx-get="/admin/mannschaften/{{ m.notion_id }}/row"
            hx-target="#mannschaft-{{ m.notion_id }}"
            hx-swap="outerHTML">
      Abbrechen
    </button>
  </td>
</tr>
