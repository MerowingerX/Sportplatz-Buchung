{% extends "base.html" %}
{% block title %}DFBnet-Buchung{% endblock %}

{% block content %}
<div class="page-header">
  <h1>DFBnet-Buchung</h1>
  <a href="/admin" class="btn btn--ghost">← Admin</a>
</div>

<div class="card card--warning">
  <p><strong>Achtung:</strong> DFBnet-Buchungen haben höchste Priorität und verdrängen bestehende Buchungen. Betroffene Nutzer werden per E-Mail benachrichtigt.</p>
</div>

<form hx-post="/admin/dfbnet"
      hx-target="#toast"
      hx-swap="outerHTML">

  <div class="form-group">
    <label for="field">Platz</label>
    <select id="field" name="field" required>
      {% for f in fields %}
        <option value="{{ f.value }}">{{ f.value }}</option>
      {% endfor %}
    </select>
  </div>

  <div class="form-group">
    <label for="date">Datum</label>
    <input type="date" id="date" name="date" required>
  </div>

  <div class="form-group">
    <label for="start_time">Startzeit</label>
    <select id="start_time" name="start_time" required>
      {% for slot in start_slots %}
        <option value="{{ slot.strftime('%H:%M') }}">{{ slot.strftime('%H:%M') }}</option>
      {% endfor %}
    </select>
  </div>

  <div class="form-group">
    <label for="duration_min">Dauer</label>
    <select id="duration_min" name="duration_min" required>
      {% for d in durations %}
        <option value="{{ d }}">{{ d }} Min</option>
      {% endfor %}
    </select>
  </div>

  <div class="form-actions">
    <button type="submit" class="btn btn--danger">DFBnet-Buchung eintragen</button>
  </div>
</form>
{% endblock %}
