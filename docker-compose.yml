services:
  app:
    build:
      context: .
      args:
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
        GIT_BRANCH: ${GIT_BRANCH:-unknown}
        GIT_DATE: ${GIT_DATE:-unknown}
    container_name: sportplatz-buchung
    restart: unless-stopped
    ports:
      - "127.0.0.1:1946:1946"
    env_file:
      - .env
    environment:
      PYTHONUNBUFFERED: "1"
      ENV_FILE: ".env"
      CONFIG_DIR: "config"
    volumes:
      - ./config:/app/config         # Config persistent – Onboarding schreibt hierher, überlebt Rebuilds
      - ./data:/app/data
      - ./logs:/app/logs
      - ./backup:/app/backup
      - ./.env:/app/.env:ro          # ← Live Changes!
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:1946/login')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
