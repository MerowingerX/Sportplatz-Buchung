<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anmelden – Sportplatz-Buchung</title>
  <link rel="stylesheet" href="/static/style.css?v=11">
  <style>
    :root {
      --color-primary: {{ vereinsfarben.primary }};
      --color-primary-hover: {{ vereinsfarben.primary_dark }};
      --color-primary-darker: {{ vereinsfarben.primary_darker }};
    }
    body::before { background-image: url('{{ logo_url }}'); }
  </style>
</head>
<body class="login-page">
  <div class="login-card">
    <div class="login-card__logo">
      <img src="{{ logo_url }}" alt="{{ vereinsname }} Wappen" class="login-card__logo-img">
    </div>
    <h1>{{ vereinsname }}</h1>
    <p class="login-card__subtitle">Melde dich an, um Plätze zu buchen und den Belegungsplan zu sehen.</p>

    {% if error %}
      <div class="error-banner">{{ error }}</div>
    {% endif %}

    <form method="post" action="/login">
      <div class="form-group">
        <label for="username">Nutzername</label>
        <input type="text" id="username" name="username" required autofocus
               placeholder="Dein Nutzername">
      </div>
      <div class="form-group">
        <label for="password">Passwort</label>
        <input type="password" id="password" name="password" required
               placeholder="Passwort">
      </div>
      <button type="submit" class="btn btn--primary btn--full">Anmelden</button>
    </form>

    <p class="login-card__hint">Noch kein Zugang? Wende dich an den Administrator.</p>
  </div>
</body>
</html>
