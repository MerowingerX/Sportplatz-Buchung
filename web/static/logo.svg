<svg viewBox="0 0 1200 1600" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <!-- Blauverlauf -->
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e4fa3"/>
      <stop offset="60%" stop-color="#0d2f6b"/>
      <stop offset="100%" stop-color="#071c44"/>
    </linearGradient>

    <!-- Weißverlauf -->
    <linearGradient id="whiteGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#eaeaea"/>
    </linearGradient>

    <!-- Schatten -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="50" stdDeviation="45"
        flood-color="#000000" flood-opacity="0.3"/>
    </filter>

    <!-- Schildform -->
    <clipPath id="shieldClip">
      <path d="
        M200 100
        L1000 100
        Q1100 100 1100 220
        L1100 900
        Q1100 1200 600 1500
        Q100 1200 100 900
        L100 220
        Q100 100 200 100
        Z"/>
    </clipPath>
  </defs>

  <!-- Außenschild mit Schatten -->
  <path d="
    M200 100
    L1000 100
    Q1100 100 1100 220
    L1100 900
    Q1100 1200 600 1500
    Q100 1200 100 900
    L100 220
    Q100 100 200 100
    Z"
    fill="url(#whiteGrad)"
    filter="url(#shadow)"/>

  <g clip-path="url(#shieldClip)">

    <!-- Oberer 20%-Bereich -->
    <rect x="100" y="100" width="1000" height="300"
          fill="url(#blueGrad)"/>

    <!-- Untere 80% -->
    <rect x="100" y="400" width="500" height="550"
          fill="url(#whiteGrad)"/>
    <rect x="600" y="400" width="500" height="550"
          fill="url(#blueGrad)"/>
    <rect x="100" y="950" width="500" height="550"
          fill="url(#blueGrad)"/>
    <rect x="600" y="950" width="500" height="550"
          fill="url(#whiteGrad)"/>

  </g>

  <!-- Teilungslinien -->
  <line x1="600" y1="400" x2="600" y2="1500"
        stroke="#ffffff"
        stroke-width="10"
        opacity="0.85"/>

  <line x1="100" y1="950" x2="1100" y2="950"
        stroke="#ffffff"
        stroke-width="10"
        opacity="0.85"/>

  <!-- Schrift oben -->
  <text x="600" y="290"
        text-anchor="middle"
        font-family="Arial Black, sans-serif"
        font-size="120"
        fill="white"
        letter-spacing="6">
        CREMLINGEN
  </text>

  <!-- TuS perfekt zentriert im oberen rechten blauen Feld -->
  <text x="850" y="675"
        text-anchor="middle"
        font-family="Arial Black, sans-serif"
        font-size="180"
        fill="white">
        TuS
  </text>

  <!-- 46 perfekt zentriert im unteren linken blauen Feld -->
  <text x="420" y="1240"
        text-anchor="middle"
        font-family="Arial Black, sans-serif"
        font-size="200"
        fill="white">
        46
  </text>

</svg>
