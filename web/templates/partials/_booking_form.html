{% if form_toast %}{{ form_toast | safe }}{% endif %}
<form id="booking-form"
      hx-post="/bookings"
      hx-target="#booking-modal-content"
      hx-swap="innerHTML"
      hx-indicator="#submit-btn">

  <div id="form-errors">
    {% if errors %}
    <ul class="errors">{% for e in errors %}<li>{{ e }}</li>{% endfor %}</ul>
    {% endif %}
  </div>

  <div class="form-group">
    <label for="field">Platz</label>
    <select id="field" name="field" required
            hx-get="/bookings/check-availability"
            hx-include="[name='date'],[name='start_time'],[name='duration_min']"
            hx-trigger="change"
            hx-target="#availability-result"
            hx-swap="innerHTML">
      <option value="">– Bitte wählen –</option>
      {% for f in fields %}
        <option value="{{ f.value }}" {{ 'selected' if prefill_field == f.value }}>{{ field_display_names.get(f.value, f.value) }}</option>
      {% endfor %}
    </select>
  </div>

  <div class="form-group">
    <label for="date" id="date-label">Datum</label>
    <input type="date" id="date" name="date" required
           value="{{ prefill_date if prefill_date else '' }}"
           hx-get="/bookings/check-availability"
           hx-include="[name='field'],[name='start_time'],[name='duration_min']"
           hx-trigger="change"
           hx-target="#availability-result"
           hx-swap="innerHTML">
  </div>

  <div class="form-group">
    <label for="start_time">Startzeit</label>
    <select id="start_time" name="start_time" required
            hx-get="/bookings/check-availability"
            hx-include="[name='field'],[name='date'],[name='duration_min']"
            hx-trigger="change"
            hx-target="#availability-result"
            hx-swap="innerHTML">
      {% for slot in start_slots %}
        <option value="{{ slot.strftime('%H:%M') }}"
                {{ 'selected' if prefill_start_time == slot.strftime('%H:%M') }}>
          {{ slot.strftime('%H:%M') }}
        </option>
      {% endfor %}
    </select>
  </div>

  <div class="form-group">
    <label for="duration_min">Dauer</label>
    <select id="duration_min" name="duration_min" required
            hx-get="/bookings/check-availability"
            hx-include="[name='field'],[name='date'],[name='start_time']"
            hx-trigger="change"
            hx-target="#availability-result"
            hx-swap="innerHTML">
      {% for d in durations %}
        <option value="{{ d }}">{{ d }} Min</option>
      {% endfor %}
    </select>
  </div>

  <!-- Einzelbuchung: Art -->
  <div id="single-fields">
    <div class="form-group">
      <label for="booking_type">Art</label>
      <select id="booking_type" name="booking_type" required>
        {% for t in booking_types %}
          <option value="{{ t.value }}">{{ t.value }}</option>
        {% endfor %}
      </select>
    </div>
  </div>

  {% if mannschaften %}
  <div class="form-group">
    <label for="mannschaft">Mannschaft <span class="label-hint">(optional)</span></label>
    <select id="mannschaft" name="mannschaft">
      <option value="">– keine –</option>
      {% for m in mannschaften %}
        <option value="{{ m.name }}" {{ 'selected' if user_mannschaft == m.name }}>{{ m.name }}</option>
      {% endfor %}
    </select>
  </div>
  {% endif %}

  <!-- Serienbuchung: Formular direkt ins Modal laden -->
  {% if current_user and current_user.role.value in ["Administrator", "DFBnet"] %}
  <div class="form-group" style="border-top:1px solid var(--border-color); padding-top:0.75rem; margin-top:0.25rem;">
    <button type="button" class="btn btn--ghost btn--sm"
            hx-get="/series/new"
            hx-include="[name='field'],[name='date'],[name='start_time']"
            hx-target="#booking-modal-content"
            hx-swap="innerHTML">
      ↗ Serienbuchung anlegen
    </button>
  </div>
  {% endif %}

  <div id="availability-result" class="availability-result"
       {% if prefill_date and prefill_field and prefill_start_time %}
       hx-get="/bookings/check-availability"
       hx-include="[name='field'],[name='date'],[name='start_time'],[name='duration_min']"
       hx-trigger="load"
       hx-target="this"
       hx-swap="innerHTML"
       {% endif %}>
  </div>

  <div id="sunset-warning"
       hx-get="/bookings/sunset-info"
       hx-include="[name='field'],[name='date'],[name='start_time'],[name='duration_min']"
       hx-trigger="{% if prefill_date %}load, {% endif %}change from:[name='field'], change from:[name='date'], change from:[name='start_time'], change from:[name='duration_min']"
       hx-target="this"
       hx-swap="innerHTML">
  </div>

  <div class="form-actions">
    <button type="button" class="btn btn--ghost"
            onclick="document.getElementById('booking-modal').close()">
      Abbrechen
    </button>
    <button type="submit" class="btn btn--primary" id="submit-btn">
      <span class="btn__label">Buchen</span>
      <span class="btn__loading htmx-indicator">Wird gebucht…</span>
    </button>
  </div>
</form>
