{% extends "base.html" %}
{% block title %}Kalender – Sportplatz-Buchung{% endblock %}

{% block content %}
<div class="page-header">
  <h1>Belegungsplan</h1>
  <button class="btn btn--primary"
          hx-get="/bookings"
          hx-target="#booking-modal-content"
          hx-swap="innerHTML"
          onclick="document.getElementById('booking-modal').showModal()">
    + Neue Buchung
  </button>
</div>

<!-- Kalender-Navigation & Wochenansicht -->
<div id="calendar-container">
  <div id="calendar-week" hx-swap="innerHTML">
    <div class="loading">Lade Kalender…</div>
  </div>
</div>

<!-- Buchungsformular Modal -->
<dialog id="booking-modal" class="modal">
  <div class="modal__header">
    <h2>Neue Buchung</h2>
    <button class="modal__close" onclick="document.getElementById('booking-modal').close()">✕</button>
  </div>
  <div id="booking-modal-content" class="modal__body">
    <!-- wird per HTMX gefüllt -->
  </div>
</dialog>

<script>
  document.body.addEventListener('closeModal', function() {
    document.getElementById('booking-modal').close();
  });

  // Ansicht je nach Bildschirmbreite wählen
  (function () {
    const isMobile = window.innerWidth < 768;
    const url = isMobile
      ? '/calendar/day?d={{ today }}'
      : '/calendar/week?year={{ year }}&week={{ week }}';
    htmx.ajax('GET', url, { target: '#calendar-week', swap: 'innerHTML' });
  })();

  // Touch-Wischen zum Blättern (nur Tagesansicht)
  (function () {
    let startX = 0;
    const container = document.getElementById('calendar-week');
    container.addEventListener('touchstart', function (e) {
      startX = e.touches[0].clientX;
    }, { passive: true });
    container.addEventListener('touchend', function (e) {
      const dx = e.changedTouches[0].clientX - startX;
      if (Math.abs(dx) < 60) return;
      const btn = dx < 0
        ? document.getElementById('day-nav-next')
        : document.getElementById('day-nav-prev');
      if (btn) btn.click();
    });
  })();
</script>
{% endblock %}
