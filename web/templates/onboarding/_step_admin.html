<div class="step-card">
  <div class="step-title">Schritt 2 — Administrator einrichten</div>
  {% if error %}
  <div class="alert alert--error" style="margin-bottom:1rem;">{{ error }}</div>
  {% endif %}
  <form hx-post="/onboarding/step/admin" hx-target="#onboarding-content" hx-swap="innerHTML">
    <div class="form-group">
      <label>Benutzername <span class="label-required">*</span></label>
      <input type="text" name="username" required placeholder="admin" autocomplete="username">
    </div>
    <div class="form-group">
      <label>Passwort <span class="label-required">*</span></label>
      <input type="password" name="password" required minlength="8" placeholder="mind. 8 Zeichen" autocomplete="new-password">
    </div>
    <div class="form-group">
      <label>Passwort wiederholen <span class="label-required">*</span></label>
      <input type="password" name="password2" required minlength="8" autocomplete="new-password">
    </div>
    <p class="check-hint" style="margin-bottom:1rem;">Ein Systemnutzer <strong>dfbnet</strong> wird automatisch mit zufälligem Passwort angelegt.</p>
    <div class="form-actions">
      <button type="submit" class="btn btn--primary">Administrator anlegen →</button>
    </div>
  </form>
</div>
