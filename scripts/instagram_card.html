<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,300;0,400;0,600;0,700;0,800;0,900;1,400&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:      {{ bg_color }};
      --primary: {{ primary_color }};
      --gold:    {{ gold_color }};
      --white:   #ffffff;
      --muted:   rgba(255,255,255,0.45);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 1080px;
      height: 1080px;
      overflow: hidden;
    }

    body {
      background: radial-gradient(ellipse at 50% 30%, color-mix(in srgb, var(--primary) 35%, var(--bg)), var(--bg) 70%);
      color: var(--white);
      font-family: 'Barlow', sans-serif;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: 64px 80px;
    }

    /* Subtle grid overlay */
    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.03) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
    }

    /* Corner accent lines */
    body::after {
      content: '';
      position: absolute;
      top: 36px; left: 36px; right: 36px; bottom: 36px;
      border: 1.5px solid rgba(255,255,255,.08);
      border-radius: 4px;
      pointer-events: none;
    }

    /* Logo watermark */
    .logo-watermark {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 700px;
      height: 700px;
      opacity: 0.12;
      pointer-events: none;
      z-index: 0;
    }
    .logo-watermark img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    /* ── TOP ────────────────────────────────────────── */
    .top {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      z-index: 1;
    }

    .logo-wrap {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: rgba(255,255,255,.08);
      border: 2px solid rgba(255,255,255,.15);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      padding: 8px;
    }

    .logo-wrap img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .matchday-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 22px;
      font-weight: 600;
      letter-spacing: .35em;
      color: var(--gold);
      text-transform: uppercase;
    }

    /* ── CENTER ─────────────────────────────────────── */
    .center {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      z-index: 1;
      width: 100%;
    }

    .team-badge {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 18px;
      font-weight: 600;
      letter-spacing: .25em;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 24px;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.12);
      padding: 6px 22px;
      border-radius: 2px;
    }

    .divider {
      width: 60px;
      height: 3px;
      background: var(--gold);
      border-radius: 2px;
      margin: 20px 0;
    }

    .divider-thin {
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.2), transparent);
      margin: 28px 0;
    }

    .game-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 800;
      font-size: 58px;
      line-height: 1.05;
      text-align: center;
      color: var(--white);
      text-transform: uppercase;
      letter-spacing: .02em;
      max-width: 900px;
      word-break: break-word;
    }

    .vs {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 300;
      font-size: 28px;
      color: var(--muted);
      letter-spacing: .2em;
      margin: 8px 0;
    }

    /* ── STATS ──────────────────────────────────────── */
    .stats {
      display: flex;
      gap: 0;
      align-items: stretch;
      width: 100%;
      z-index: 1;
    }

    .stat {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      padding: 16px 12px;
      border-top: 2px solid var(--gold);
    }

    .stat + .stat {
      border-left: 1px solid rgba(255,255,255,.1);
    }

    .stat-icon {
      font-size: 20px;
      line-height: 1;
    }

    .stat-value {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 30px;
      color: var(--white);
      letter-spacing: .03em;
    }

    .stat-label {
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .1em;
    }

    /* ── FOOTER ─────────────────────────────────────── */
    .footer {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 16px;
      font-weight: 400;
      letter-spacing: .2em;
      color: var(--muted);
      text-transform: uppercase;
      z-index: 1;
    }
  </style>
</head>
<body>

  {% if logo_b64 %}
  <div class="logo-watermark">
    <img src="data:image/svg+xml;base64,{{ logo_b64 }}" alt="">
  </div>
  {% endif %}

  <!-- TOP -->
  <div class="top">
    {% if logo_b64 %}
    <div class="logo-wrap">
      <img src="data:image/svg+xml;base64,{{ logo_b64 }}" alt="Logo">
    </div>
    {% endif %}
    <div class="matchday-label">Matchday</div>
  </div>

  <!-- CENTER -->
  <div class="center">
    {% if mannschaft %}
    <div class="team-badge">{{ mannschaft }}</div>
    {% endif %}

    {% if home and away %}
      <div class="game-title">{{ home }}</div>
      <div class="vs">vs.</div>
      <div class="game-title" style="color: var(--gold);">{{ away }}</div>
    {% else %}
      <div class="game-title">{{ title }}</div>
    {% endif %}

    <div class="divider-thin"></div>

    <div class="stats">
      <div class="stat">
        <span class="stat-icon">📅</span>
        <span class="stat-value">{{ date_label }}</span>
        <span class="stat-label">Datum</span>
      </div>
      <div class="stat">
        <span class="stat-icon">🕐</span>
        <span class="stat-value">{{ time_label }}</span>
        <span class="stat-label">Anstoß</span>
      </div>
      <div class="stat">
        <span class="stat-icon">📍</span>
        <span class="stat-value" style="font-size:22px;">{{ venue_label }}</span>
        <span class="stat-label">Spielort</span>
      </div>
    </div>
  </div>

  <!-- FOOTER -->
  <div class="footer">{{ vereinsname }}</div>

</body>
</html>
